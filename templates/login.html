{% extends 'base.html' %}
{% block title %}Login — Smart Attendance{% endblock %}

{% block extra_css %}
<style>
  body { background: var(--bg); }
  .login-wrap {
    min-height: calc(100vh - 56px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .login-top {
    background: var(--accent-dim);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 24px;
    text-align: center;
  }
  .login-top .brand-icon {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #fff;
    margin: 0 auto 14px;
  }
  .login-top h1 {
    font-size: 18px; font-weight: 700;
    color: var(--text); margin: 0 0 4px;
    letter-spacing: -0.3px;
  }
  .login-top p { font-size: 13px; color: var(--text-muted); margin: 0; }
  .login-body { padding: 28px 32px; }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-top">
      <div class="brand-icon"><i class="bi bi-camera-video-fill"></i></div>
      <h1>Smart Attendance</h1>
      <p>Sign in to your staff account</p>
    </div>
    <div class="login-body">
      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-4">
          <label for="username" class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Enter username" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Enter password" required>
          </div>
        </div>
        <div class="mb-4 form-check">
          <input type="checkbox" class="form-check-input" id="remember" name="remember">
          <label class="form-check-label" for="remember">Remember me</label>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
          </button>
        </div>
      </form>
    </div>
    <div class="card-footer text-center">
      Contact your administrator to reset your password
    </div>
  </div>
</div>
{% endblock %}
